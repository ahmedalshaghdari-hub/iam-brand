<style>

.login-bg{min-height:100vh;background:linear-gradient(135deg,#6D28D9,#4C1D95);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.3)}

.app-header{background:linear-gradient(135deg,#6D28D9,#5B21B6);color:white;padding:10px 16px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(109,40,217,.4)}
.hinner{max-width:1200px;margin:0 auto}.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dtabs{display:flex;gap:4px;flex-wrap:wrap}.dtab{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;font-weight:600;background:rgba(255,255,255,.15);color:white;transition:all .2s;white-space:nowrap}.dtab.act{background:white;color:#6D28D9;font-weight:800}

.card{background:white;border-radius:14px;padding:16px 18px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #EDE9FE;margin-bottom:14px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}

</style></head>
<body>
<div id="app"><div class="splash"><div class="splash-logo">✨</div><div style="color:white;font-size:22px;font-weight:900">IAM Brand</div><div style="color:rgba(255,255,255,.7);font-size:13px;margin-top:4px">نظام المحاسبة الذكي</div></div></div>
<div id="notif" class="notif"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,createContext,useContext}=React;

/* ═══ CONFIG ════════════════════════════════════════ */
const GH_OWNER="ahmedalshaghdari-hub";
const GH_DB_REPO="iam-brand-db";
const TOKEN_KEY="iam_ghtoken_v1";
let _sha=null,_cache=null,_writing=false,_queue=[];
const getToken=()=>localStorage.getItem(TOKEN_KEY)||'';
const setToken=t=>localStorage.setItem(TOKEN_KEY,t);

/* ═══ GITHUB SYNC ════════════════════════════════════ */
async function ghRead(){
  const t=getToken();if(!t)throw new Error('no token');
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_DB_REPO}/contents/data.json`,
    {headers:{Authorization:`Bearer ${t}`,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok)throw new Error('read '+r.status);
  const f=await r.json();_sha=f.sha;
  _cache=JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\s/g,'')))));
  ['products','sales','expenses','capital','withdrawals','campaigns','purchases','returns'].forEach(k=>{if(!_cache[k])_cache[k]={};});
  return _cache;
}
async function ghWrite(updater){return new Promise((res,rej)=>{_queue.push({updater,res,rej});processQ();});}
async function processQ(){
  if(_writing||!_queue.length)return;_writing=true;
  const{updater,res,rej}=_queue.shift();
  try{
    const data=_cache?JSON.parse(JSON.stringify(_cache)):await ghRead();
    ['products','sales','expenses','capital','withdrawals','campaigns','purchases','returns'].forEach(k=>{if(!data[k])data[k]={};});
    updater(data);data.ts=Date.now();
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_DB_REPO}/contents/data.json`,{
      method:'PUT',headers:{Authorization:`Bearer ${getToken()}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'sync',content,sha:_sha})
    });
    if(r.status===409){await ghRead();_writing=false;_queue.unshift({updater,res,rej});return processQ();}
    if(!r.ok)throw new Error('write '+r.status);
    const result=await r.json();_sha=result.content.sha;_cache=data;res(data);
  }catch(e){rej(e);}finally{_writing=false;processQ();}
}

/* ═══ ACCOUNTS & TABS ════════════════════════════════ */
// احمد 92.5%  ·  منصور 5%  ·  عبدالقادر 2.5%
const ACCOUNTS=[
  {id:'ahmed',  name:'أحمد',        pct:.925, color:'#6D28D9',bg:'#F5F3FF',border:'#C4B5FD'},
  {id:'mansour',name:'منصور',       pct:.05,  color:'#047857',bg:'#ECFDF5',border:'#A7F3D0'},
  {id:'aq',     name:'عبدالقادر',   pct:.025, color:'#DC2626',bg:'#FEF2F2',border:'#FECACA'},
];
const ADMIN_TABS=[
  {id:0,ico:'🏠',lbl:'الرئيسية'},{id:1,ico:'📦',lbl:'المنتجات'},
  {id:2,ico:'💰',lbl:'المبيعات'},{id:3,ico:'📊',lbl:'المصاريف'},
  {id:4,ico:'🧮',lbl:'الحاسبة'},{id:5,ico:'🏦',lbl:'الصناديق'},
  {id:6,ico:'💼',lbl:'رأس المال'},{id:7,ico:'📅',lbl:'التقارير'},
  {id:8,ico:'📈',lbl:'الأرباح'},{id:9,ico:'📣',lbl:'الحملات'},{id:11,ico:'🛒',lbl:'فواتير الشراء'},{id:12,ico:'↩️',lbl:'المرتجعات'},
  {id:10,ico:'⚙️',lbl:'الإعدادات'},
];
const MANSOUR_TABS=[{id:1,ico:'📦',lbl:'المنتجات'},{id:2,ico:'💰',lbl:'المبيعات'}];
const AQ_TABS=[{id:3,ico:'📊',lbl:'المصاريف'}];

const EXP_TYPES=['تسويق','شحن','إيجار','تشغيل','أخرى'];
const CATS=['عناية بالبشرة','عطور','شعر','مكياج','منظفات','أخرى'];
const MN=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const PLATFORMS=['انستغرام','تيك توك','سناب شات','تويتر/X','يوتيوب','جوجل','أخرى'];
const AuthCtx=createContext(null);

/* ═══ HELPERS ════════════════════════════════════════ */
const fmt=n=>(+(n)||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>(+(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const today=()=>new Date().toISOString().split('T')[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const mkMonth=d=>(d||'').slice(0,7);
const mName=k=>{if(!k)return'';const[y,m]=k.split('-');return`${MN[+m-1]||''} ${y}`;};
function notify(msg){const el=document.getElementById('notif');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

/* total unit cost including shipping+marketing per unit */
const unitCost=p=>(+p.buyP||0)+(+p.unitShip||0)+(+p.unitMkt||0);

const calcFin=(sales,expenses,withdrawals,mFilter=null)=>{
  const f=mFilter?x=>mkMonth(x.date)===mFilter:()=>true;
  const s=sales.filter(f),e=expenses.filter(f),w=withdrawals.filter(f);
  const totalRev=s.reduce((a,x)=>a+(x.revenue||0),0);
  const totalCost=s.reduce((a,x)=>a+(x.cost||0),0);
  const gross=totalRev-totalCost;
  const totalExp=e.reduce((a,x)=>a+(x.amount||0),0);
  const net=gross-totalExp;
  const accs=ACCOUNTS.map(ac=>{
    const share=net*ac.pct;
    const drawn=w.filter(x=>x.pid===ac.id).reduce((a,x)=>a+(x.amount||0),0);
    return{...ac,share,drawn,balance:share-drawn};
  });
  return{totalRev,totalCost,gross,totalExp,net,accs,count:s.length};
};

/* ═══ EXCEL EXPORT ════════════════════════════════════ */
const exportExcel=(products,sales,expenses,withdrawals,capital,campaigns,purchases=[],returns=[])=>{
  const wb=XLSX.utils.book_new();
  const add=(n,rows)=>{if(rows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),n);};
  add('المنتجات',products.map(p=>({'اسم المنتج':p.name,'الفئة':p.cat,'الوحدة':p.unit,'الباركود':p.barcode||'','سعر الشراء':+p.buyP||0,'شحن/وحدة':+p.unitShip||0,'تسويق/وحدة':+p.unitMkt||0,'إجمالي التكلفة':unitCost(p),'سعر البيع':+p.sellP||0,'المخزون':+p.stock||0,'هامش %':unitCost(p)>0?+((p.sellP-unitCost(p))/unitCost(p)*100).toFixed(1):0})));
  const ss=[...sales].sort((a,b)=>a.date.localeCompare(b.date));
  add('المبيعات',ss.map(s=>({'التاريخ':s.date,'العميل':s.note||'','إجمالي البيع':+s.revenue||0,'الخصم':+s.discount||0,'شحن إضافي':+s.extraShip||0,'تكلفة البضاعة':+s.cost||0,'الربح الإجمالي':+s.profit||0})));
  add('المصاريف',[...expenses].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({'التاريخ':e.date,'النوع':e.type,'الوصف':e.desc,'المبلغ':+e.amount||0})));
  add('رأس المال',[...capital].sort((a,b)=>a.date.localeCompare(b.date)).map(c=>{const ac=ACCOUNTS.find(x=>x.id===c.pid);return{'التاريخ':c.date,'الشريك':ac?.name||c.pid,'المبلغ':+c.amount||0,'الوصف':c.note||''};}));
  add('السحوبات',[...withdrawals].sort((a,b)=>a.date.localeCompare(b.date)).map(w=>{const ac=ACCOUNTS.find(x=>x.id===w.pid);return{'التاريخ':w.date,'الحساب':ac?.name||w.pid,'المبلغ':+w.amount||0,'ملاحظة':w.note||''};}));
  add('الحملات الإعلانية',[...campaigns].sort((a,b)=>a.date.localeCompare(b.date)).map(c=>({'التاريخ':c.date,'المنصة':c.platform,'الوصف':c.desc||'','الميزانية':+c.budget||0,'الوصول':+c.reach||0,'النقرات':+c.clicks||0,'الطلبات':+c.orders||0,'الإيرادات':+c.revenue||0,'ROAS':c.budget>0?+((c.revenue/c.budget).toFixed(2)):0,'ROI %':c.budget>0?+(((c.revenue-c.budget)/c.budget*100).toFixed(1)):0})));
  const fin=calcFin(sales,expenses,withdrawals);
  add('ملخص الصناديق',fin.accs.map(ac=>{const cap=capital.filter(c=>c.pid===ac.id).reduce((a,x)=>a+(x.amount||0),0);return{'الحساب':ac.name,'النسبة':`${(ac.pct*100).toFixed(1)}%`,'رأس المال':cap,'حصة الأرباح':+ac.share.toFixed(2),'المسحوب':+ac.drawn.toFixed(2),'الرصيد الكلي':+(cap+ac.share-ac.drawn).toFixed(2)};}));
  const allYrs=[...new Set([...sales,...expenses].map(x=>(x.date||'').slice(0,4)).filter(Boolean))];
  if(!allYrs.length)allYrs.push(String(new Date().getFullYear()));
  const monthly=[];
  allYrs.sort().forEach(yr=>{for(let m=1;m<=12;m++){const mk=`${yr}-${String(m).padStart(2,'0')}`;const mf=calcFin(sales,expenses,withdrawals,mk);if(mf.totalRev>0||mf.totalExp>0)monthly.push({'السنة':yr,'الشهر':MN[m-1],'المبيعات':+mf.totalRev.toFixed(2),'تكلفة البضاعة':+mf.totalCost.toFixed(2),'إجمالي الربح':+mf.gross.toFixed(2),'المصاريف':+mf.totalExp.toFixed(2),'صافي الربح':+mf.net.toFixed(2),'أحمد 92.5%':+(mf.net*.925).toFixed(2),'منصور 5%':+(mf.net*.05).toFixed(2),'عبدالقادر 2.5%':+(mf.net*.025).toFixed(2)});}});
  add('الأرباح الشهرية',monthly);
  add('المرتجعات',[...returns].map(r=>({'التاريخ':r.date,'السبب':r.reason,'الإجمالي':r.totalCost||0,'المنتجات':(r.items||[]).map(it=>it.pname+' ×'+it.qty).join(' · ')})));
  XLSX.writeFile(wb,`IAM_Brand_${today()}.xlsx`);notify('✅ تم تصدير Excel!');
};

/* ═══ UI ATOMS ════════════════════════════════════════ */
const Inp=({label,req,...p})=><div className="fg">{label&&<label>{label}{req&&<span style={{color:'#EF4444'}}> *</span>}</label>}<input className="fc" {...p}/></div>;
const Sel=({label,children,...p})=><div className="fg">{label&&<label>{label}</label>}<select className="fc" {...p}>{children}</select></div>;
const Btn=({children,v='p',style={},...p})=>{const c={p:'bp',s:'bs',d:'bd',g:'bg2',xl:'bxl',w:'bw'};return<button className={`btn ${c[v]||'bp'}`} style={style} {...p}>{children}</button>;};
const Badge=({children,color='#6D28D9',bg='#F5F3FF'})=><span className="badge" style={{color,background:bg}}>{children}</span>;
const KPI=({ico,lbl,val,sub,color='#6D28D9',bg='#F5F3FF'})=>(
  <div className="kcard"><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
    <div><div style={{fontSize:11,color:'#64748B',fontWeight:600,marginBottom:5}}>{lbl}</div>
      <div style={{fontSize:16,fontWeight:800,color,lineHeight:1.3}}>{val}</div>
      {sub&&<div style={{fontSize:11,color:'#94A3B8',marginTop:3}}>{sub}</div>}
    </div>
    <div style={{fontSize:18,background:bg,borderRadius:9,padding:'5px 7px',flexShrink:0,marginRight:6}}>{ico}</div>
  </div></div>
);

/* ═══ SETUP SCREEN ════════════════════════════════════ */
function SetupScreen({onDone}){
  const[tok,setTok]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const go=async()=>{if(!tok.trim()){setErr('أدخل الرمز أولاً');return;}setLoading(true);setErr('');setToken(tok.trim());
    try{await ghRead();onDone();}catch(e){setErr('الرمز غير صحيح.');localStorage.removeItem(TOKEN_KEY);}finally{setLoading(false);}};
  return(<div className="setup-bg"><div className="auth-card">
    <div style={{textAlign:'center',marginBottom:20}}><div style={{fontSize:40}}>✨</div>
      <h2 style={{fontSize:18,fontWeight:900,color:'#1E293B',margin:'6px 0 3px'}}>IAM Brand</h2>
      <p style={{fontSize:12,color:'#94A3B8'}}>نظام المحاسبة الذكي</p>
    </div>
    <div style={{background:'#F5F3FF',borderRadius:12,padding:'12px 14px',marginBottom:14,border:'1px solid #DDD6FE',fontSize:13,color:'#4C1D95',lineHeight:1.8}}>
      📌 أدخل رمز الاتصال (يُعطيك إياه أحمد) — يُحفظ تلقائياً على هذا الجهاز
    </div>
    <div className="fg" style={{marginBottom:12}}>
      <label>رمز الاتصال</label>
      <input className="fc" type="password" value={tok} onChange={e=>{setTok(e.target.value);setErr('');}} placeholder="ghp_..." onKeyDown={e=>e.key==='Enter'&&go()} style={{direction:'ltr',textAlign:'left'}}/>
    </div>
    {err&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',color:'#DC2626',borderRadius:9,padding:'8px 12px',fontSize:13,marginBottom:10}}>{err}</div>}

/* ═══ SALES ═══════════════════════════════════════════ */
function Sales({sales,products,onWrite}){
  const{user}=useContext(AuthCtx);const isAdmin=user.role==='admin';
  const ei={pid:'',pname:'',qty:1,sellP:0,buyP:0,unitShip:0,unitMkt:0};
  const[date,setDate]=useState(today());const[note,setNote]=useState('');
  const[items,setItems]=useState([{...ei}]);const[discount,setDiscount]=useState('');const[extraShip,setExtraShip]=useState('');
  const[filter,setFilter]=useState('');const[open,setOpen]=useState(false);const[editId,setEditId]=useState(null);
  const startEdit=s=>{
    setDate(s.date||today());setNote(s.note||'');
    setItems(s.items&&s.items.length>0?s.items:[{...ei}]);
    syncGifts(s.gifts||[]);  // sync ref + state
    setDiscount(s.discount?String(s.discount):'');
    setExtraShip(s.extraShip?String(s.extraShip):'');
    setEditId(s.id);setOpen(true);
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const upd=(i,k,v)=>{const n=[...items];n[i]={...n[i],[k]:v};if(k==='pid'){const pr=products.find(p=>p.id===v);if(pr)n[i]={...n[i],pname:pr.name,sellP:pr.sellP,buyP:+pr.buyP||0,unitShip:+pr.unitShip||0,unitMkt:+pr.unitMkt||0};}setItems(n);};
  const totals=useMemo(()=>{
    const subTotal=items.reduce((s,it)=>s+(+it.qty*(+it.sellP)||0),0);
    const cost=items.reduce((s,it)=>s+(+it.qty*(+it.buyP+(+it.unitShip||0)+(+it.unitMkt||0))||0),0)+(+extraShip||0);
    const revenue=Math.max(0,subTotal-(+discount||0));
    return{subTotal,cost,revenue,profit:revenue-cost};
  },[items,discount,extraShip]);
  const[giftItems,setGiftItems]=useState([]);
  const giftRef=useRef([]);  // ref للقراءة المضمونة في doSave
  const[giftPid,setGiftPid]=useState('');
  const[giftQty,setGiftQty]=useState(1);
  const syncGifts=newArr=>{giftRef.current=newArr;setGiftItems(newArr);};
  const addGift=()=>{
    if(!giftPid)return;
    const pr=products.find(p=>p.id===giftPid);if(!pr)return;
    const uc=unitCost(pr);
    const newArr=[...giftRef.current,{pid:pr.id,pname:pr.name,qty:+giftQty||1,cost:uc}];
    syncGifts(newArr);
    setGiftPid('');setGiftQty(1);
  };
  const removeGift=i=>{const newArr=giftRef.current.filter((_,j)=>j!==i);syncGifts(newArr);};
  const doSave=()=>{
    if(!items.some(it=>it.pname||it.sellP>0))return;
    // ✅ snapshot كامل قبل أي reset — الحل لمشكلة stale closure
    const _id=editId||uid();
    const _eid=editId;
    const _date=date, _note=note;
    const _items=[...items];
    const _gifts=[...giftRef.current];  // من useRef مضمون 100%
    const _disc=+discount||0, _ship=+extraShip||0;
    const _rev=totals.revenue, _cost=totals.cost, _pft=totals.profit;
    const _giftCost=_gifts.reduce((s,g)=>s+(g.qty*(g.cost||0)),0);

    onWrite(d=>{
      // ↩️ عكس المخزون القديم عند التعديل
      if(_eid&&d.sales[_eid]){
        const old=d.sales[_eid];
        (old.items||[]).forEach(it=>{if(it.pid&&d.products[it.pid])d.products[it.pid].stock=(Number(d.products[it.pid].stock)||0)+Number(it.qty||0);});
        (old.gifts||[]).forEach(g=>{if(g.pid&&d.products[g.pid])d.products[g.pid].stock=(Number(d.products[g.pid].stock)||0)+Number(g.qty||0);});
      }
      // 💾 حفظ الفاتورة
      d.sales[_id]={id:_id,date:_date,note:_note,items:_items,gifts:_gifts,discount:_disc,extraShip:_ship,revenue:_rev,cost:_cost,profit:_pft};
      // 📦 خصم مخزون الأصناف المباعة
      _items.forEach(it=>{if(it.pid&&d.products[it.pid]){d.products[it.pid].stock=Math.max(0,(Number(d.products[it.pid].stock)||0)-Number(it.qty||0));}});
      // 🎁 خصم مخزون الهدايا
      _gifts.forEach(g=>{
        if(g.pid&&d.products[g.pid]){
          d.products[g.pid].stock=Math.max(0,(Number(d.products[g.pid].stock)||0)-Number(g.qty||0));
        }
      });
      // 📊 تكلفة الهدايا → مصاريف تسويق
      if(_giftCost>0){const eid=uid();d.expenses[eid]={id:eid,date:_date,type:'تسويق',desc:'هدايا مجانية — '+(_note||'فاتورة'),amount:_giftCost};}
    });

    // reset بعد onWrite (لا يؤثر على الـ snapshot)
    setItems([{...ei}]);syncGifts([]);setGiftPid('');setGiftQty(1);
    setNote('');setDate(today());setDiscount('');setExtraShip('');
    setOpen(false);setEditId(null);
    notify(_eid?'✅ تم تعديل الفاتورة وتحديث المخزون':'✅ تم حفظ الفاتورة وتحديث المخزون');
  };
  const list=[...sales].filter(s=>!filter||s.date.startsWith(filter)).sort((a,b)=>b.date.localeCompare(a.date));
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8,flexWrap:'wrap'}}>

/* ═══ COST CALCULATOR ═════════════════════════════════ */
function CostCalc(){
  const[f,setF]=useState({buyP:'',ship:'',mkt:'',overhead:'',targetMargin:50,qty:1});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const calc=useMemo(()=>{
    const buy=+f.buyP||0,ship=+f.ship||0,mkt=+f.mkt||0,oh=+f.overhead||0,qty=+f.qty||1;
    const unitCostV=buy+ship+mkt;const totalUnitCost=unitCostV+(oh/qty);
    if(totalUnitCost===0)return null;
    const margin=+f.targetMargin||50;
    const minPrice=totalUnitCost;
    const at20=totalUnitCost*1.2;const at40=totalUnitCost*1.4;const at60=totalUnitCost*1.6;
    const at100=totalUnitCost*2;const atTarget=totalUnitCost*(1+margin/100);
    const breakeven=oh>0?Math.ceil(oh/(atTarget-unitCostV)):null;
    return{unitCostV,totalUnitCost,minPrice,at20,at40,at60,at100,atTarget,margin,breakeven};
  },[f]);
  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,marginBottom:4}}>🧮 حاسبة التكاليف والتسعير</h2>
    <p style={{fontSize:13,color:'#94A3B8',marginBottom:14}}>احسب أفضل سعر للبيع وحقق النمو</p>
    <div className="card" style={{border:'2px solid #A78BFA'}}>
      <div style={{fontWeight:800,fontSize:14,color:'#6D28D9',marginBottom:12}}>📥 أدخل تكاليف المنتج</div>
      <div className="fgrid">
        <Inp label="سعر الشراء (تكلفة المنتج)" type="number" value={f.buyP} onChange={s('buyP')} placeholder="0"/>
        <Inp label="تكلفة الشحن إليك / وحدة" type="number" value={f.ship} onChange={s('ship')} placeholder="0"/>
        <Inp label="ميزانية التسويق / وحدة" type="number" value={f.mkt} onChange={s('mkt')} placeholder="0"/>
        <Inp label="مصاريف ثابتة (إيجار، كهرباء...)" type="number" value={f.overhead} onChange={s('overhead')} placeholder="0"/>
        <Inp label="عدد الوحدات المتوقع بيعها" type="number" value={f.qty} onChange={s('qty')} placeholder="1"/>
        <div className="fg">
          <label>هامش الربح المستهدف: {f.targetMargin}%</label>
          <input type="range" min="10" max="200" value={f.targetMargin} onChange={s('targetMargin')} style={{width:'100%',marginTop:8,accentColor:'#6D28D9'}}/>
        </div>
      </div>
      {calc&&<div className="calc-result">
        <div style={{fontWeight:900,fontSize:15,color:'#6D28D9',marginBottom:14}}>📊 نتائج التسعير</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:14}}>
          <div className="kcard"><div style={{fontSize:11,color:'#64748B',fontWeight:600,marginBottom:4}}>التكلفة الإجمالية/وحدة</div><div style={{fontSize:16,fontWeight:900,color:'#DC2626'}}>{fmt(calc.totalUnitCost)} ر.ي</div></div>
          <div className="kcard"><div style={{fontSize:11,color:'#64748B',fontWeight:600,marginBottom:4}}>الحد الأدنى للبيع</div><div style={{fontSize:16,fontWeight:900,color:'#92400E'}}>{fmt(calc.minPrice)} ر.ي</div><div style={{fontSize:10,color:'#94A3B8'}}>نقطة التعادل فقط</div></div>
          <div className="kcard" style={{border:'2px solid #A78BFA',background:'#F5F3FF'}}><div style={{fontSize:11,color:'#6D28D9',fontWeight:700,marginBottom:4}}>✨ السعر المقترح ({calc.margin}%)</div><div style={{fontSize:18,fontWeight:900,color:'#6D28D9'}}>{fmt(calc.atTarget)} ر.ي</div>{calc.breakeven&&<div style={{fontSize:10,color:'#94A3B8'}}>تعادل بعد {calc.breakeven} وحدة</div>}</div>
        </div>
        <div style={{fontWeight:700,fontSize:13,color:'#475569',marginBottom:8}}>🎯 جدول الأسعار:</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {[[20,calc.at20,'#94A3B8'],[40,calc.at40,'#047857'],[60,calc.at60,'#059669'],[100,calc.at100,'#6D28D9']].map(([pct,price,col])=>(
            <div key={pct} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'white',borderRadius:9,border:'1px solid #EDE9FE'}}>
              <span style={{fontSize:13,fontWeight:600,color:'#475569'}}>هامش {pct}%</span>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:15,fontWeight:800,color:col}}>{fmt(price)} ر.ي</span>
                <span style={{fontSize:11,color:'#94A3B8'}}>ربح {fmt(price-calc.totalUnitCost)}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:14,padding:'10px 14px',background:'#FFF7ED',borderRadius:10,border:'1px solid #FED7AA'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#92400E',marginBottom:6}}>💡 توصيات النمو:</div>
          <div style={{fontSize:13,color:'#78350F',lineHeight:1.8}}>
            {calc.totalUnitCost>0&&calc.atTarget>0&&<>
              {+f.mkt/(calc.atTarget)*100>30?<div>⚠️ تكلفة التسويق عالية ({((+f.mkt/calc.atTarget)*100).toFixed(0)}% من السعر) — فكّر في خفضها</div>:<div>✅ نسبة تكلفة التسويق معقولة</div>}
              {calc.margin<30?<div>⚠️ الهامش المستهدف أقل من 30% — يُنصح برفعه لضمان النمو</div>:<div>✅ الهامش المستهدف جيد للنمو</div>}
              {calc.breakeven&&<div>📊 تحتاج بيع {calc.breakeven} وحدة لتغطية المصاريف الثابتة</div>}
              <div>🎯 سعر مقترح للنمو السريع: {fmt(calc.at40)} — {fmt(calc.at60)} ر.ي</div>
            </>}
          </div>
        </div>
      </div>}
    </div>
  </div>);
}

      <KPI ico="💸" lbl="المصاريف" val={`${fmt(tot.totalExp)} ر.ي`} color="#DC2626" bg="#FEF2F2"/>

/* ═══ CAMPAIGN ANALYTICS ══════════════════════════════ */
function Campaigns({campaigns,onWrite}){
  const empty={date:today(),platform:PLATFORMS[0],desc:'',budget:'',reach:'',clicks:'',orders:'',revenue:''};
  const[form,setForm]=useState(empty);const[open,setOpen]=useState(false);
  const s=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const submit=()=>{if(!form.budget||+form.budget<=0)return;const id=uid();onWrite(d=>d.campaigns[id]={...form,id,budget:+form.budget,reach:+form.reach||0,clicks:+form.clicks||0,orders:+form.orders||0,revenue:+form.revenue||0});setForm(empty);setOpen(false);notify('✅ تم حفظ الحملة');};
  const list=[...campaigns].sort((a,b)=>b.date.localeCompare(a.date));
  const totals=useMemo(()=>({budget:list.reduce((s,c)=>s+c.budget,0),revenue:list.reduce((s,c)=>s+c.revenue,0),orders:list.reduce((s,c)=>s+c.orders,0)}),[list]);
  const bestCamp=useMemo(()=>list.reduce((best,c)=>{const roas=c.budget>0?c.revenue/c.budget:0;return roas>(best?best.revenue/best.budget:0)?c:best;},null),[list]);
  const getMetrics=c=>({roas:c.budget>0?(c.revenue/c.budget).toFixed(1):null,roi:c.budget>0?((c.revenue-c.budget)/c.budget*100).toFixed(0):null,cpa:c.orders>0?(c.budget/c.orders).toFixed(1):null,cpm:c.reach>0?(c.budget/c.reach*1000).toFixed(2):null,cvr:c.clicks>0?(c.orders/c.clicks*100).toFixed(1):null});
  const recommend=c=>{const r=c.budget>0?c.revenue/c.budget:0;if(r>=5)return{txt:'🚀 حملة ممتازة — ضاعف الميزانية',cls:'tag-green'};if(r>=3)return{txt:'✅ حملة جيدة — حسّن الإعلانات',cls:'tag-purple'};if(r>=1.5)return{txt:'⚠️ متوسطة — راجع الاستهداف',cls:'tag-purple'};return{txt:'❌ عائد منخفض — أوقف وراجع',cls:'tag-red'};};
  const byPlatform=useMemo(()=>{const p={};list.forEach(c=>{if(!p[c.platform])p[c.platform]={budget:0,revenue:0,orders:0};p[c.platform].budget+=c.budget;p[c.platform].revenue+=c.revenue;p[c.platform].orders+=c.orders;});return p;},[list]);
  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,marginBottom:4}}>📣 تحليل الحملات الإعلانية</h2>
    <p style={{fontSize:13,color:'#94A3B8',marginBottom:14}}>قس أداء حملاتك واحصل على توصيات ذكية</p>
    {totals.budget>0&&<div className="kgrid">
      <KPI ico="💸" lbl="إجمالي الإنفاق" val={`${fmt(totals.budget)} ر.ي`} color="#DC2626" bg="#FEF2F2"/>
      <KPI ico="💰" lbl="إيرادات الحملات" val={`${fmt(totals.revenue)} ر.ي`} color="#047857" bg="#ECFDF5"/>
      <KPI ico="📊" lbl="ROAS الإجمالي" val={totals.budget>0?`${(totals.revenue/totals.budget).toFixed(1)}x`:'—'} color={totals.budget>0&&totals.revenue/totals.budget>=3?'#047857':'#DC2626'} bg={totals.budget>0&&totals.revenue/totals.budget>=3?'#ECFDF5':'#FEF2F2'} sub="عائد كل ريال أنفقته"/>
      <KPI ico="🛒" lbl="إجمالي الطلبات" val={fmtN(totals.orders)} color="#6D28D9" bg="#F5F3FF" sub={totals.orders>0?`CPA: ${fmt(totals.budget/totals.orders)}`:null}/>
    </div>}
    {Object.keys(byPlatform).length>1&&<div className="card"><div style={{fontWeight:800,fontSize:14,marginBottom:12}}>🏆 مقارنة المنصات</div>
      <div className="twrap"><table><thead><tr>{['المنصة','الإنفاق','الإيرادات','ROAS','الطلبات','CPA'].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{Object.entries(byPlatform).sort((a,b)=>b[1].revenue/b[1].budget-a[1].revenue/a[1].budget).map(([pf,d])=>{const roas=d.budget>0?(d.revenue/d.budget).toFixed(1):0;const cpa=d.orders>0?(d.budget/d.orders).toFixed(0):'-';return(<tr key={pf}>
        <td style={{fontWeight:700}}>{pf}</td>
        <td style={{color:'#DC2626'}}>{fmt(d.budget)}</td>
        <td style={{color:'#047857',fontWeight:700}}>{fmt(d.revenue)}</td>

        <td>{fmtN(d.orders)}</td>
        <td style={{color:'#64748B'}}>{cpa}</td>
      </tr>);})}</tbody>
      </table></div>
    </div>}

    </div>

        <Inp label="الوصول (Reach)" type="number" value={form.reach} onChange={s('reach')} placeholder="0"/>
        <Inp label="النقرات (Clicks)" type="number" value={form.clicks} onChange={s('clicks')} placeholder="0"/>
        <Inp label="الطلبات (Orders)" type="number" value={form.orders} onChange={s('orders')} placeholder="0"/>
        <Inp label="الإيرادات من الحملة" type="number" value={form.revenue} onChange={s('revenue')} placeholder="0"/>
      </div>
      {+form.budget>0&&+form.revenue>0&&(()=>{const roas=(+form.revenue/+form.budget).toFixed(1);const roi=((+form.revenue-+form.budget)/+form.budget*100).toFixed(0);return<div style={{background:'#F5F3FF',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',gap:14,flexWrap:'wrap',fontSize:13}}>
        <span>ROAS: <strong style={{color:roas>=3?'#047857':'#DC2626'}}>{roas}x</strong></span>
        <span>ROI: <strong style={{color:roi>=0?'#047857':'#DC2626'}}>{roi>0?'+':''}{roi}%</strong></span>

        {totals.revenue/totals.budget>=2&&totals.revenue/totals.budget<4&&<div>📈 ROAS {(totals.revenue/totals.budget).toFixed(1)}x — جيد. اختبر محتوى جديد وحسّن صفحات المنتج</div>}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(<div style={{padding:24,textAlign:'center'}}><div style={{fontSize:32,marginBottom:12}}>⚠️</div><div style={{fontWeight:800,fontSize:16,color:'#DC2626',marginBottom:8}}>حدث خطأ في التطبيق</div><div style={{fontSize:13,color:'#64748B',marginBottom:16}}>{this.state.err.message}</div><button className="btn bp" onClick={()=>this.setState({err:null})}>إعادة المحاولة</button></div>);
    return this.props.children;
  }
}

/* ═══ PurchaseInvoices ═══════════════════════════════ */
function PurchaseInvoices({purchases,products,onWrite}){
  var emptyForm={invoiceNo:'',supplier:'',date:today(),shipping:'',otherCosts:'',distMethod:'value',items:[]};
  var s1=useState(emptyForm);var form=s1[0];var setForm=s1[1];
  var s2=useState(false);var open=s2[0];var setOpen=s2[1];
  var s3=useState(null);var viewId=s3[0];var setViewId=s3[1];
  var s4=useState({pid:'',qty:'',unitPrice:''});var iItem=s4[0];var setIItem=s4[1];
  function upd(k){return function(e){setForm(function(f){var n={};Object.assign(n,f);n[k]=e.target.value;return n;});};}
  function calcLanded(items,shipping,otherCosts,method){
    var tot=(Number(shipping)||0)+(Number(otherCosts)||0);
    var totVal=items.reduce(function(s,it){return s+(Number(it.qty)*Number(it.unitPrice)||0);},0);
    var totQty=items.reduce(function(s,it){return s+(Number(it.qty)||0);},0);
    return items.map(function(it){
      var itVal=Number(it.qty)*Number(it.unitPrice);
      var share=method==='value'?(totVal>0?itVal/totVal*tot:0):(totQty>0?Number(it.qty)/totQty*tot:0);
      var perUnit=Number(it.qty)>0?share/Number(it.qty):0;
      var landed=Number(it.unitPrice)+perUnit;
      var pr=products.find(function(p){return p.id===it.pid;});
      var margin=landed>0&&pr&&pr.sellP>0?((pr.sellP-landed)/landed*100).toFixed(1):null;
      return Object.assign({},it,{share:+share.toFixed(2),perUnit:+perUnit.toFixed(2),landed:+landed.toFixed(2),itemLanded:+(Number(it.qty)*landed).toFixed(2),margin:margin});
    });
  }
  function addItem(){
    if(!iItem.pid||!iItem.qty||!iItem.unitPrice)return;
    var pr=products.find(function(p){return p.id===iItem.pid;});
    if(!pr)return;
    setForm(function(f){return Object.assign({},f,{items:[...f.items,{pid:pr.id,pname:pr.name,qty:Number(iItem.qty),unitPrice:Number(iItem.unitPrice)}]});});
    setIItem({pid:'',qty:'',unitPrice:''});
  }
  function submit(){
    if(!form.items.length||!form.supplier)return;
    var id=uid();
    var li=calcLanded(form.items,form.shipping,form.otherCosts,form.distMethod);
    var tg=form.items.reduce(function(s,it){return s+(Number(it.qty)*Number(it.unitPrice)||0);},0);
    var tl=li.reduce(function(s,it){return s+it.itemLanded;},0);
    onWrite(function(d){
      d.purchases[id]=Object.assign({},form,{id:id,shipping:Number(form.shipping)||0,otherCosts:Number(form.otherCosts)||0,totalGoods:tg,totalLanded:tl,landedItems:li});
      li.forEach(function(it){
        if(d.products[it.pid]){
          d.products[it.pid].buyP=Number(it.unitPrice);
          d.products[it.pid].unitShip=Number(it.perUnit.toFixed(2));
          d.products[it.pid].stock=(Number(d.products[it.pid].stock)||0)+Number(it.qty);
        }
      });
    });
    setForm(emptyForm);setOpen(false);
    notify('✅ تم حفظ الفاتورة وتحديث '+li.length+' منتج (تكلفة+مخزون)');
  }
  var list=[...purchases].sort(function(a,b){return b.date.localeCompare(a.date);});
  var preview=useMemo(function(){return form.items.length>0?calcLanded(form.items,form.shipping,form.otherCosts,form.distMethod):[];},[form.items,form.shipping,form.otherCosts,form.distMethod]);
  var tGoods=form.items.reduce(function(s,it){return s+(Number(it.qty)*Number(it.unitPrice)||0);},0);
  var tExtra=(Number(form.shipping)||0)+(Number(form.otherCosts)||0);
  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,marginBottom:4}}>🛒 فواتير الشراء</h2>
    <p style={{fontSize:13,color:'#94A3B8',marginBottom:14}}>الشراء يحدّث تكلفة المنتج والمخزون تلقائياً</p>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontWeight:700,fontSize:14}}>الفواتير ({list.length})</span>
      <Btn onClick={function(){setOpen(function(v){return !v;});}}>{ open?'✕ إغلاق':'➕ فاتورة شراء' }</Btn>
    </div>
    {open&&<div className="card" style={{border:'2px solid #A78BFA',marginBottom:14}}>
      <div style={{fontWeight:800,fontSize:14,color:'#6D28D9',marginBottom:12}}>🛒 فاتورة جديدة</div>
      <div className="fgrid" style={{marginBottom:12}}>
        <Inp label="رقم الفاتورة" value={form.invoiceNo} onChange={upd('invoiceNo')} placeholder="INV-001"/>
        <Inp label="المورد ✶" req value={form.supplier} onChange={upd('supplier')} placeholder="اسم المورد"/>
        <Inp label="التاريخ" type="date" value={form.date} onChange={upd('date')}/>
        <Inp label="تكلفة الشحن الكلية" type="number" value={form.shipping} onChange={upd('shipping')} placeholder="0"/>
        <Inp label="تكاليف أخرى (جمارك)" type="number" value={form.otherCosts} onChange={upd('otherCosts')} placeholder="0"/>
        <Sel label="طريقة توزيع الشحن" value={form.distMethod} onChange={upd('distMethod')}>
          <option value="value">بحسب قيمة المنتج</option>
          <option value="qty">بحسب الكمية</option>
        </Sel>
      </div>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>المنتجات:</div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 80px 100px auto',gap:8,marginBottom:10,alignItems:'end'}}>
        <Sel value={iItem.pid} onChange={function(e){setIItem(function(p){return Object.assign({},p,{pid:e.target.value});});}}>
          <option value="">-- اختر منتج --</option>
          {products.map(function(p){return <option key={p.id} value={p.id}>{p.name}</option>;})}
        </Sel>
        <Inp type="number" value={iItem.qty} onChange={function(e){setIItem(function(p){return Object.assign({},p,{qty:e.target.value});});}} placeholder="كمية"/>
        <Inp type="number" value={iItem.unitPrice} onChange={function(e){setIItem(function(p){return Object.assign({},p,{unitPrice:e.target.value});});}} placeholder="سعر الشراء"/>
        <Btn v="s" style={{padding:'9px 12px'}} onClick={addItem}>＋</Btn>
      </div>
      {form.items.length>0&&<>
        <div className="twrap" style={{marginBottom:12}}>
          <table>
            <thead><tr style={{background:'#6D28D9',color:'white'}}>
              {['المنتج','الكمية','سعر الشراء','شحن/وحدة','التكلفة الحقيقية','هامش%',''].map(function(h){return <th key={h} style={{background:'#6D28D9',color:'white',padding:'7px 9px'}}>{h}</th>;})}
            </tr></thead>
            <tbody>{preview.map(function(it,i){return(
              <tr key={i}>
                <td style={{fontWeight:700,padding:'7px 9px'}}>{it.pname}</td>
                <td style={{padding:'7px 9px',textAlign:'center'}}>{it.qty}</td>
                <td style={{padding:'7px 9px',color:'#64748B'}}>{fmt(it.unitPrice)}</td>
                <td style={{padding:'7px 9px',color:'#DC2626'}}>{fmt(it.perUnit)}</td>
                <td style={{padding:'7px 9px',fontWeight:800,color:'#6D28D9'}}>{fmt(it.landed)}</td>
                <td style={{padding:'7px 9px'}}>{it.margin?<span className={Number(it.margin)>=30?'tag-green':'tag-red'}>{it.margin}%</span>:'—'}</td>
                <td style={{padding:'7px 9px'}}><Btn v="d" style={{padding:'3px 8px',fontSize:11}} onClick={function(){setForm(function(f){return Object.assign({},f,{items:f.items.filter(function(_,j){return j!==i;})});});}}>✕</Btn></td>
              </tr>
            );})}</tbody>
          </table>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
          <span className="tag-purple">البضاعة: {fmt(tGoods)}</span>
          {tExtra>0&&<span className="tag-red">شحن+أخرى: {fmt(tExtra)}</span>}
          <span className="tag-green">الإجمالي: {fmt(tGoods+tExtra)}</span>
        </div>
        <Btn v="s" onClick={submit}>💾 حفظ وتحديث المنتجات تلقائياً</Btn>
      </>}
    </div>}
    {list.length===0?<div className="card" style={{textAlign:'center',padding:32,color:'#94A3B8'}}>لا توجد فواتير شراء بعد</div>
    :list.map(function(inv){return(
      <div key={inv.id} className="card" style={{border:'1px solid #EDE9FE'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}}>
          <div>
            <div style={{fontWeight:800,fontSize:14}}>🛒 {inv.supplier} {inv.invoiceNo&&<span style={{color:'#94A3B8',fontSize:12}}>#{inv.invoiceNo}</span>}</div>
            <div style={{fontSize:12,color:'#94A3B8',margin:'3px 0'}}>{inv.date} · {(inv.items||[]).length} منتج</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:5}}>
              <span className="tag-purple">بضاعة: {fmt(inv.totalGoods)}</span>
              {inv.shipping>0&&<span className="tag-red">شحن: {fmt(inv.shipping)}</span>}
              <span className="tag-green">الكلي: {fmt(inv.totalLanded)}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <Btn v="g" style={{padding:'5px 12px',fontSize:12}} onClick={function(){setViewId(viewId===inv.id?null:inv.id);}}>تفصيل</Btn>
            <Btn v="d" style={{padding:'5px 10px',fontSize:12}} onClick={function(){if(window.confirm('حذف؟')){onWrite(function(d){delete d.purchases[inv.id];});notify('تم الحذف');}}}>🗑️</Btn>
          </div>
        </div>
        {viewId===inv.id&&inv.landedItems&&<div style={{marginTop:12,borderTop:'1px solid #F1F5F9',paddingTop:12}}>
          <div className="twrap"><table>
            <thead><tr>{['المنتج','الكمية','سعر الشراء','شحن/وحدة','التكلفة/وحدة','هامش'].map(function(h){return <th key={h}>{h}</th>;})}</tr></thead>
            <tbody>{inv.landedItems.map(function(it,i){var pr=products.find(function(p){return p.id===it.pid;});return(
              <tr key={i}>
                <td style={{fontWeight:700}}>{it.pname}</td><td style={{textAlign:'center'}}>{it.qty}</td>
                <td style={{color:'#64748B'}}>{fmt(it.unitPrice)}</td><td style={{color:'#DC2626'}}>{fmt(it.perUnit)}</td>
                <td style={{color:'#6D28D9',fontWeight:800}}>{fmt(it.landed)}</td>
                <td>{it.margin?<span className={Number(it.margin)>=30?'tag-green':'tag-red'}>{it.margin}%</span>:'—'}</td>
              </tr>
            );})}</tbody>
          </table></div>
        </div>}
      </div>
    );})}
  </div>);
}

      </div>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>المنتجات المرتجعة:</div>

          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="tag-red">تكلفة: {fmt(r.totalCost)}</span>
            <Btn v="d" style={{padding:'4px 9px',fontSize:12}} onClick={function(){if(window.confirm('حذف؟')){onWrite(function(d){delete d.returns[r.id];});notify('تم الحذف');}}}>🗑️</Btn>
          </div>
        </div>
      </div>
    );})}
  </div>);
}

/* ═══ SETTINGS ════════════════════════════════════════ */
function Settings({onLogout,onWrite,products,sales,expenses,withdrawals,capital,campaigns,cfg,onExcel}){
  const[p,setP]=useState({ahmed:'',mansour:'',aq:''});const[ok,setOk]=useState(false);
  const savePwd=()=>{if(!p.ahmed&&!p.mansour&&!p.aq)return;onWrite(d=>{if(p.ahmed)d.config.pwd_ahmed=p.ahmed;if(p.mansour)d.config.pwd_mansour=p.mansour;if(p.aq)d.config.pwd_aq=p.aq;});setOk(true);setP({ahmed:'',mansour:'',aq:''});setTimeout(()=>setOk(false),3000);notify('✅ تم تغيير كلمات المرور');};
  const resetTok=()=>{if(window.confirm('إعادة إدخال رمز الاتصال؟')){localStorage.removeItem(TOKEN_KEY);sessionStorage.removeItem('iam_u');window.location.reload();}};
  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,marginBottom:4}}>⚙️ الإعدادات</h2><p style={{fontSize:13,color:'#94A3B8',marginBottom:14}}>IAM Brand — إدارة النظام</p>
    <div className="card" style={{background:'linear-gradient(135deg,#F0FDF4,#ECFDF5)',border:'2px solid #A7F3D0'}}>
      <div style={{fontWeight:800,fontSize:15,color:'#047857',marginBottom:8}}>📥 تصدير Excel الشامل</div>
      <p style={{fontSize:13,color:'#065F46',marginBottom:14,lineHeight:1.7}}>ملف Excel متكامل بـ 8 ورقات: منتجات · مبيعات · مصاريف · رأس المال · سحوبات · حملات · ملخص الصناديق · أرباح شهرية</p>
      <button className="btn bxl" onClick={onExcel} style={{padding:'12px 24px',fontSize:14}}>📊 تصدير Excel الآن</button>
    </div>
    <div className="card">
      <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>🔐 تغيير كلمات المرور</div>
      <div className="fgrid">
        <Inp label="كلمة مرور أحمد الجديدة" type="password" value={p.ahmed} onChange={e=>setP(x=>({...x,ahmed:e.target.value}))} placeholder="اتركه فارغاً للإبقاء"/>
        <Inp label="كلمة مرور منصور الجديدة" type="password" value={p.mansour} onChange={e=>setP(x=>({...x,mansour:e.target.value}))} placeholder="اتركه فارغاً للإبقاء"/>
        <Inp label="كلمة مرور عبدالقادر الجديدة" type="password" value={p.aq} onChange={e=>setP(x=>({...x,aq:e.target.value}))} placeholder="اتركه فارغاً للإبقاء"/>
      </div>
      <Btn onClick={savePwd}>{ok?'✅ تم على جميع الأجهزة':'💾 حفظ كلمات المرور'}</Btn>
    </div>
    <div className="card">
      <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>👥 الصلاحيات</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{background:'#F5F3FF',borderRadius:10,padding:'12px 14px',border:'1px solid #C4B5FD'}}><div style={{fontWeight:800,color:'#6D28D9',fontSize:14,marginBottom:4}}>👑 أحمد — المالك (92.5%)</div><div style={{fontSize:12,color:'#7C3AED'}}>✅ كل شيء: إدارة كاملة · جميع التقارير · Excel · كلمات مرور</div></div>
        <div style={{background:'#ECFDF5',borderRadius:10,padding:'12px 14px',border:'1px solid #A7F3D0'}}><div style={{fontWeight:800,color:'#047857',fontSize:14,marginBottom:4}}>🤝 منصور — شريك (5%)</div><div style={{fontSize:12,color:'#059669',marginBottom:3}}>✅ إضافة منتجات · إصدار فواتير</div><div style={{fontSize:12,color:'#DC2626'}}>🚫 لا يرى أسعار الشراء أو التكاليف أو التقارير المالية</div></div>
        <div style={{background:'#FEF2F2',borderRadius:10,padding:'12px 14px',border:'1px solid #FECACA'}}><div style={{fontWeight:800,color:'#DC2626',fontSize:14,marginBottom:4}}>📊 عبدالقادر — عمولة (2.5%)</div><div style={{fontSize:12,color:'#EF4444'}}>✅ إضافة مصاريف فقط · لا يرى أي أرقام مالية أخرى</div></div>
      </div>
    </div>
    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
      <Btn v="d" onClick={onLogout} style={{padding:'10px 18px',fontSize:14}}>🚪 تسجيل الخروج</Btn>
      <Btn v="g" onClick={resetTok} style={{padding:'10px 18px',fontSize:13}}>🔑 تغيير رمز الاتصال</Btn>
    </div>
  </div>);
}

/* ═══ MAIN APP ════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(()=>{try{const u=sessionStorage.getItem('iam_u');return u?JSON.parse(u):null;}catch{return null;}});
  const[tab,setTab]=useState(0);
  const[products,setProducts]=useState([]);const[sales,setSales]=useState([]);
  const[expenses,setExpenses]=useState([]);const[withdrawals,setWithdrawals]=useState([]);
  const[capital,setCapital]=useState([]);const[campaigns,setCampaigns]=useState([]);const[purchases,setPurchases]=useState([]);const[returns,setReturns]=useState([]);
  const[cfg,setCfg]=useState({pwd_ahmed:'1234',pwd_mansour:'5678',pwd_aq:'9012'});
  const[syncState,setSyncState]=useState('loading');const[lastTs,setLastTs]=useState(0);
  const[moreOpen,setMoreOpen]=useState(false);const[hasToken,setHasToken]=useState(!!getToken());

  const applyData=d=>{
    setProducts(Object.values(d.products||{}));setSales(Object.values(d.sales||{}));
    setExpenses(Object.values(d.expenses||{}));setWithdrawals(Object.values(d.withdrawals||{}));
    setCapital(Object.values(d.capital||{}));setCampaigns(Object.values(d.campaigns||{}));setPurchases(Object.values(d.purchases||{}));setReturns(Object.values(d.returns||{}));
    setCfg(d.config||{pwd_ahmed:'1234',pwd_mansour:'5678',pwd_aq:'9012'});
    setLastTs(d.ts||0);
  };

  useEffect(()=>{
    if(!getToken()){setSyncState('notoken');return;}
    ghRead().then(d=>{applyData(d);setSyncState('ok');}).catch(()=>setSyncState('err'));
    const poll=setInterval(()=>{ghRead().then(d=>{if((d.ts||0)>lastTs){applyData(d);notify('🔄 تم التحديث');}setSyncState('ok');}).catch(()=>setSyncState('err'));},30000);
    return()=>clearInterval(poll);
  },[hasToken]);

  const onWrite=useCallback(updater=>{
    setSyncState('busy');
    ghWrite(updater).then(d=>{applyData(d);setSyncState('ok');}).catch(()=>{setSyncState('err');notify('❌ خطأ في الحفظ');});
  },[lastTs]);

  const handleLogin=u=>{setUser(u);sessionStorage.setItem('iam_u',JSON.stringify(u));setTab(u.role==='admin'?0:u.role==='mansour'?1:3);};
  const handleLogout=()=>{sessionStorage.removeItem('iam_u');setUser(null);};
  const onExcel=()=>exportExcel(products,sales,expenses,withdrawals,capital,campaigns,purchases,returns);

  const accsData=useMemo(()=>{
    const fin=calcFin(sales,expenses,withdrawals);
    return ACCOUNTS.map(ac=>{
      const pd=fin.accs.find(x=>x.id===ac.id);
      const capTotal=capital.filter(c=>c.pid===ac.id).reduce((a,x)=>a+(x.amount||0),0);
      const share=pd?.share||0;const drawn=pd?.drawn||0;
      return{...ac,share,drawn,capTotal,netBalance:capTotal+share-drawn};
    });
  },[sales,expenses,withdrawals,capital]);

  if(syncState==='notoken'||!hasToken)return<SetupScreen onDone={()=>{setHasToken(true);setSyncState('loading');}}/>;
  if(syncState==='loading')return<div className="splash"><div className="splash-logo">✨</div><div style={{color:'white',fontSize:16,fontWeight:800}}>جاري تحميل IAM Brand...</div></div>;
  if(!user)return<LoginScreen onLogin={handleLogin} cfg={cfg}/>;

  const TABS=user.role==='admin'?ADMIN_TABS:user.role==='mansour'?MANSOUR_TABS:AQ_TABS;
  const isAdmin=user.role==='admin';
  const bottomTabs=TABS.slice(0,5);const moreTabs=TABS.slice(5);
  const goTab=id=>{setTab(id);setMoreOpen(false);};
  const syncLabel={ok:'متزامن ☁️',busy:'جاري الحفظ...',err:'خطأ في الاتصال'};

  const renderContent=()=>{
    switch(tab){
      case 0:return isAdmin?<Dashboard sales={sales} expenses={expenses} withdrawals={withdrawals} capital={capital} accsData={accsData} onExcel={onExcel} products={products}/>:null;
      case 1:return<Products products={products} onWrite={onWrite}/>;
      case 2:return<Sales sales={sales} products={products} onWrite={onWrite}/>;
      case 3:return<Expenses expenses={expenses} onWrite={onWrite}/>;
      case 4:return isAdmin?<CostCalc/>:null;
      case 5:return isAdmin?<Safes withdrawals={withdrawals} accsData={accsData} onWrite={onWrite}/>:null;
      case 6:return isAdmin?<Capital capital={capital} accsData={accsData} onWrite={onWrite}/>:null;
      case 7:return isAdmin?<MonthlyReport sales={sales} expenses={expenses} withdrawals={withdrawals}/>:null;
      case 8:return isAdmin?<PL sales={sales} expenses={expenses} withdrawals={withdrawals} capital={capital}/>:null;
      case 9:return isAdmin?<Campaigns campaigns={campaigns} onWrite={onWrite}/>:null;
      case 11:return isAdmin?<PurchaseInvoices purchases={purchases} products={products} onWrite={onWrite}/>:null;
      case 12:return isAdmin?<Returns returns={returns} products={products} onWrite={onWrite}/>:null;
      case 10:return isAdmin?<Settings onLogout={handleLogout} onWrite={onWrite} products={products} sales={sales} expenses={expenses} withdrawals={withdrawals} capital={capital} campaigns={campaigns} cfg={cfg} onExcel={onExcel}/>:null;
      default:return null;
    }
  };

  return(<AuthCtx.Provider value={{user}}>
    <header className="app-header"><div className="hinner">
      <div className="hrow">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>✨</span>
          <div>
            <div style={{fontWeight:900,fontSize:15,lineHeight:1.2}}>IAM Brand</div>
            <div style={{fontSize:11,opacity:.85,display:'flex',alignItems:'center',gap:4}}>
              {user.name} <span className={`sync-dot ${syncState}`}></span><span style={{fontSize:10}}>{syncLabel[syncState]||''}</span>
            </div>
          </div>
        </div>
        <button onClick={handleLogout} style={{background:'rgba(255,255,255,.18)',border:'none',color:'white',padding:'6px 12px',borderRadius:8,cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:12}}>خروج</button>
      </div>
      <div className="dtabs">{TABS.map(t=><button key={t.id} className={`dtab ${tab===t.id?'act':''}`} onClick={()=>setTab(t.id)}>{t.ico} {t.lbl}</button>)}</div>
    </div></header>
    <div className="content">{renderContent()}</div>
    {isAdmin&&<button className="fab-xl" onClick={onExcel}>📊 Excel</button>}
    {moreTabs.length>0&&<><div className={`mov ${moreOpen?'open':''}`} onClick={()=>setMoreOpen(false)}/><div className={`mmenu ${moreOpen?'open':''}`}>{moreTabs.map(t=><button key={t.id} className={`mmi ${tab===t.id?'act':''}`} onClick={()=>goTab(t.id)}><span>{t.ico}</span>{t.lbl}</button>)}</div></>}
    <nav className="bnav">
      {bottomTabs.map(t=><button key={t.id} className={`bni ${tab===t.id?'act':''}`} onClick={()=>setTab(t.id)}><span className="ico">{t.ico}</span>{t.lbl}</button>)}
      {moreTabs.length>0&&<button className={`bni ${moreTabs.some(t=>t.id===tab)||moreOpen?'act':''}`} onClick={()=>setMoreOpen(v=>!v)}><span className="ico">⋯</span>المزيد</button>}
    </nav>
  </AuthCtx.Provider>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
const mf={name:'IAM Brand',short_name:'IAM',start_url:'.',display:'standalone',background_color:'#6D28D9',theme_color:'#6D28D9',lang:'ar',dir:'rtl',icons:[{src:`data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#6D28D9"/><text y="75" x="50" text-anchor="middle" font-size="62">✨</text></svg>')}`,sizes:'any',type:'image/svg+xml'}]};
const mb=new Blob([JSON.stringify(mf)],{type:'application/json'});const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
if('serviceWorker' in navigator){const sw=`const C='iam-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}
</script>
</body>
